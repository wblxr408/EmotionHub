services:
  # Flask 预测服务
  ranker-serving:
    build:
      context: .
      dockerfile: serving/Dockerfile
    container_name: emotionhub-ranker
    ports:
      - "5000:5000"
    environment:
      - MODEL_PATH=/app/model/ranker.txt
    volumes:
      - ./model:/app/model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
